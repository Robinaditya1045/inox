version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: inox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inox
    ports:
      # Map host port 5432 to container port 5432 so your local Go server can connect
      - "5432:5432"
    volumes:
      # Named volume guarantees database data persists across container restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready checks if the PostgreSQL server is actively accepting connections
      test: ["CMD-SHELL", "pg_isready -U postgres -d inox"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: inox-redis
    restart: unless-stopped
    ports:
      # Map host port 6379 to container port 6379
      - "6379:6379"
    volumes:
      # Persistent volume so cached sessions survive container restarts during local dev
      - redis_data:/data
    healthcheck:
      # redis-cli ping returns PONG when Redis is ready for traffic
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
